<table class="table table-bordered">

<tr>
<th>Room</th>
<th>Floor</th>
<th>Capacity</th>
<th>Status</th>
</tr>

{% for room in rooms %}

<tr>

<td>{{ room[1] }}</td>
<td>{{ room[2] }}</td>
<td>{{ room[3] }}</td>

<td>

{% if room[4] == "Available" %}
<span class="badge bg-success">Available</span>
{% else %}
<span class="badge bg-danger">Occupied</span>
{% endif %}

</td>

</tr>

{% endfor %}

</table>
